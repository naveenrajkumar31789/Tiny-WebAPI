<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>Tiny URL</h1>
  </div>

  <!-- Form Section -->
  <div class="form-section">
    <div class="form-row">
      <input type="text" [(ngModel)]="url" placeholder="Enter URL to shorten" class="url-input" />
      <label class="private-label"><input type="checkbox" [(ngModel)]="isPrivate" /> IsPrivate</label>
    </div>
    <button (click)="shorten()" class="btn-shorten">Generate</button>

    <!-- Result Message -->
    <div *ngIf="result" class="result-box">
      <p><strong>Short Code:</strong> <span class="code">{{result.shortCode}}</span></p>
      <p><strong>Full URL:</strong> <a [href]="result.full" target="_blank" class="result-link">{{result.full}}</a></p>
    </div>
  </div>

  <!-- Public URLs Section -->
  <div class="list-section">
    <h2>Public URLs</h2>
    <input type="text" placeholder="Search URLs ..." [(ngModel)]="search" (input)="updateFilteredList()" class="search-input" />

    <!-- List Container -->
    <div class="list-container">
      <!-- List Items -->
      <div *ngIf="filteredItems.length > 0; else noResults">
        <div *ngFor="let item of filteredItems" class="list-item">
          <!-- URL Row with Code and Link -->
          <div class="url-row">
            <span class="code-badge">{{item.shortCode}}</span>
            <div class="col-url">
              <a [href]="item.originalUrl" target="_blank" class="url-link" title="{{item.originalUrl}}">{{item.originalUrl}}</a>
              <span class="url-description">{{item.originalUrl | slice:0:30}}...</span>
            </div>
          </div>

          <!-- Clicks and Actions Row -->
          <div class="url-meta">
            <div class="col-clicks">
              <span class="clicks-badge">{{item.hits}} clicks</span>
            </div>
            <div class="col-actions">
              <button (click)="copy(item.shortCode)" class="btn-copy" title="Copy to clipboard">Copy</button>
              <button (click)="delete(item.shortCode)" class="btn-delete" title="Delete URL">Delete</button>
            </div>
          </div>
        </div>
      </div>

      <!-- No Results -->
      <ng-template #noResults>
        <div class="no-results">No URLs found</div>
      </ng-template>
    </div>
  </div>
</div>
