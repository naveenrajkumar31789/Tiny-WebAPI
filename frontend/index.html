<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TinyUrl Frontend</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Tiny URL</h1>
    <section class="shorten">
      <h2>Create short link</h2>
      <input id="urlInput" placeholder="https://example.com" />
      <label><input type="checkbox" id="privateCheckbox" /> Private</label>
      <button id="shortenBtn">Shorten</button>
      <div id="shortenResult"></div>
    </section>

    <section class="list">
      <h2>Public Short URLs</h2>
      <input id="search" placeholder="Search by code or URL" />
      <button id="refreshBtn">Refresh</button>
      <ul id="list"></ul>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
